<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🛒 APK PREM RAUL | CapCut & AM Premium</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 30% 10%, #0a0a0a 0%, #000000 100%);
      color: #e0e0e0;
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      background: rgba(0,0,0,0.9);
      padding: 25px 20px;
      text-align: center;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #ffffff, #aaaaaa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .header p { font-size: 0.8rem; color: #888; margin-top: 5px; }
    
    .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
    
    /* Section Title */
    .section-title {
      font-size: 1.3rem;
      margin: 30px 0 20px;
      color: #ccc;
      border-left: 3px solid #888;
      padding-left: 15px;
    }
    
    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }
    
    .product-card {
      background: rgba(15,15,15,0.95);
      border-radius: 24px;
      padding: 25px 20px;
      border: 1px solid #2a2a2a;
      transition: all 0.3s ease;
      text-align: center;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: #666;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .product-icon {
      font-size: 3.5rem;
      margin-bottom: 15px;
    }
    .product-icon i {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 60px;
      color: #ccc;
    }
    
    .product-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 8px;
      color: #fff;
    }
    
    .product-price {
      font-size: 1.6rem;
      color: #ffaa44;
      font-weight: bold;
      margin: 12px 0;
    }
    .product-price small {
      font-size: 0.8rem;
      color: #888;
    }
    
    .product-desc {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    
    .btn-buy {
      background: #2a2a2a;
      color: white;
      border: 1px solid #444;
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1rem;
    }
    .btn-buy:hover {
      background: #3a3a3a;
      border-color: #ffaa44;
      transform: scale(1.02);
    }
    .btn-buy i { margin-right: 8px; }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.96);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal-content {
      background: #111;
      border-radius: 24px;
      padding: 30px;
      max-width: 450px;
      width: 90%;
      border: 1px solid #333;
    }
    .modal-content h3 {
      color: #ffaa44;
      margin-bottom: 10px;
      font-size: 1.3rem;
    }
    .modal-content p { margin-bottom: 10px; color: #ccc; }
    .close-modal {
      float: right;
      cursor: pointer;
      font-size: 1.5rem;
      color: #888;
      transition: 0.2s;
    }
    .close-modal:hover { color: white; }
    
    /* Payment Methods */
    .payment-methods {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 25px 0;
      flex-wrap: wrap;
    }
    .payment-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 60px;
      padding: 12px 20px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
      flex: 1;
      min-width: 100px;
    }
    .payment-btn:hover {
      border-color: #ffaa44;
      transform: translateY(-2px);
      background: #222;
    }
    .payment-btn i { font-size: 1.5rem; display: block; margin-bottom: 8px; color: #ffaa44; }
    .payment-btn .payment-name { font-size: 0.8rem; font-weight: bold; color: #ccc; }
    
    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #0a0a0a;
      color: white;
      font-size: 0.9rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: #ffaa44;
    }
    
    footer {
      text-align: center;
      padding: 25px;
      margin-top: 30px;
      border-top: 1px solid #222;
      font-size: 0.7rem;
      color: #555;
    }
    
    @media (max-width: 600px) {
      .product-grid { grid-template-columns: 1fr; }
      .payment-methods { flex-direction: column; }
      .payment-btn { width: 100%; }
      .container { padding: 20px 15px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1><i class="fas fa-store"></i> APK PREM RAUL</h1>
  <p>Aplikasi Premium | Harga Terjangkau | Garansi 100% Work</p>
</div>

<div class="container">
  <div class="section-title">
    <i class="fas fa-crown"></i> 🔥 PRODUK PREMIUM
  </div>
  
  <div class="product-grid" id="productGrid"></div>
</div>

<!-- MODAL PEMBAYARAN -->
<div id="paymentModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <h3 id="modalProductName">-</h3>
    <p id="modalProductPrice">-</p>
    <hr style="margin: 15px 0; border-color: #333;">
    
    <p><strong><i class="fas fa-user"></i> Isi Data Diri:</strong></p>
    <div class="form-group">
      <label>Nama Lengkap</label>
      <input type="text" id="buyerName" placeholder="Contoh: Ahmad Rizki">
    </div>
    <div class="form-group">
      <label>Nomor WhatsApp (aktif)</label>
      <input type="text" id="buyerPhone" placeholder="081234567890">
    </div>
    
    <p><strong><i class="fas fa-credit-card"></i> Pilih Metode Pembayaran:</strong></p>
    <div class="payment-methods">
      <div class="payment-btn" onclick="pilihPembayaran('QRIS')">
        <i class="fas fa-qrcode"></i>
        <span class="payment-name">QRIS</span>
      </div>
      <div class="payment-btn" onclick="pilihPembayaran('DANA')">
        <i class="fas fa-wallet"></i>
        <span class="payment-name">DANA</span>
      </div>
      <div class="payment-btn" onclick="pilihPembayaran('GOPAY')">
        <i class="fas fa-mobile-alt"></i>
        <span class="payment-name">GOPAY</span>
      </div>
    </div>
  </div>
</div>

<footer>
  <i class="fas fa-copyright"></i> 2025 APK PREM RAUL | All Rights Reserved
</footer>

<script>
  // ========== KONFIGURASI TELEGRAM ==========
  // 🔴 GANTI DENGAN USERNAME TELEGRAM KAMU 🔴
  const ADMIN_USERNAME = "hadxzjasconfess";
  
  // ========== DATA PRODUK (HANYA 2) ==========
  const products = [
    { 
      id: 1, 
      name: "CapCut Pro Mod", 
      icon: "fas fa-video", 
      price: 10000, 
      priceText: "Rp 10.000",
      period: "sekali bayar",
      desc: "Full fitur premium, tanpa watermark, semua template unlocked",
      bestseller: true 
    },
    { 
      id: 2, 
      name: "AM Premium", 
      icon: "fas fa-crown", 
      price: 3000, 
      priceText: "Rp 3.000",
      period: "/tahun",
      desc: "Alight Motion Premium, semua efek unlocked, ekspor HD tanpa watermark",
      bestseller: true 
    }
  ];
  
  let selectedProduct = null;
  
  // ========== RENDER PRODUK ==========
  function renderProducts() {
    const grid = document.getElementById('productGrid');
    
    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-icon">
          <i class="${p.icon}"></i>
        </div>
        <div class="product-title">${p.name}</div>
        <div class="product-price">
          ${p.priceText} <small>${p.period || ''}</small>
        </div>
        <div class="product-desc">${p.desc}</div>
        <button class="btn-buy" onclick="openPaymentModal(${p.id})">
          <i class="fas fa-shopping-cart"></i> Beli Sekarang
        </button>
      </div>
    `).join('');
  }
  
  // ========== BUKA MODAL PEMBAYARAN ==========
  function openPaymentModal(productId) {
    selectedProduct = products.find(p => p.id === productId);
    document.getElementById('modalProductName').innerHTML = `<i class="${selectedProduct.icon}"></i> ${selectedProduct.name}`;
    document.getElementById('modalProductPrice').innerHTML = `Harga: <strong style="color:#ffaa44">${selectedProduct.priceText}</strong> ${selectedProduct.period || ''}`;
    document.getElementById('paymentModal').style.display = 'flex';
  }
  
  function closeModal() {
    document.getElementById('paymentModal').style.display = 'none';
    selectedProduct = null;
  }
  
  // ========== PILIH PEMBAYARAN & KIRIM KE TELEGRAM ==========
  function pilihPembayaran(metode) {
    const nama = document.getElementById('buyerName').value.trim();
    const phone = document.getElementById('buyerPhone').value.trim();
    
    if (!nama) {
      alert("⚠️ Masukkan nama lengkap!");
      return;
    }
    if (!phone) {
      alert("⚠️ Masukkan nomor WhatsApp!");
      return;
    }
    
    if (!phone.match(/^[0-9]{10,13}$/)) {
      alert("⚠️ Nomor WhatsApp tidak valid! Masukkan 10-13 digit angka.");
      return;
    }
    
    // Format pesan untuk Telegram
    const pesan = `🛍️ *PESANAN BARU* 🛍️\n\n👤 Nama: ${nama}\n📱 WhatsApp: ${phone}\n📦 Produk: ${selectedProduct.name}\n💰 Harga: ${selectedProduct.priceText}\n💳 Metode: ${metode}\n\n⏰ Waktu: ${new Date().toLocaleString('id-ID')}\n\n_📌 Silakan konfirmasi pembayaran, setelah diverifikasi APK akan dikirim._`;
    
    // Buat link Telegram untuk chat pribadi
    const encodedMessage = encodeURIComponent(pesan);
    const telegramLink = `https://t.me/${ADMIN_USERNAME}?text=${encodedMessage}`;
    
    // Buka chat Telegram
    window.open(telegramLink, '_blank');
    
    // Tutup modal
    closeModal();
    
    // Reset form
    document.getElementById('buyerName').value = '';
    document.getElementById('buyerPhone').value = '';
  }
  
  // Render produk saat halaman dimuat
  renderProducts();
</script>
</body>
</html>
